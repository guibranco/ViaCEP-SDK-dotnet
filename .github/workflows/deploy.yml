name: Deploy to NuGet

on:
  push:
    branches: [main]
    paths:
      - 'Src/**'
      - '.github/workflows/deploy.yml'
      - 'GitVersion.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔧 Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: "6.x"

      - name: 🏷️ Determine version number
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2

      - name: 📣 Print resolved version
        run: |
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"
          echo "All outputs:"
          echo "${{ toJson(steps.gitversion.outputs) }}"

      - name: 🧰 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 📦 Restore dependencies
        run: dotnet restore

      - name: 🏗️ Build project
        run: dotnet build Src/ViaCep/ViaCep.csproj --no-restore --configuration Release /p:Version=${{ steps.gitversion.outputs.fullSemVer }}

      - name: 📦 Pack NuGet package
        run: dotnet pack Src/ViaCep/ViaCep.csproj --no-build --configuration Release /p:Version=${{ steps.gitversion.outputs.fullSemVer }} --output ./artifacts

      - name: 🚀 Push package to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
